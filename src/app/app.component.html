<!-- ================= HEADER ================= -->
<header class="bg-info-subtle">
  <nav class="navbar navbar-expand-lg glass-navbar shadow-sm px-2">
    <div class="container-fluid">
      <!-- Brand -->
      <a class="navbar-brand fw-bold d-flex align-items-center" routerLink="/users">
        <i class="bi bi-people-fill me-2"></i>
        {{ title }}
      </a>

      <!-- Toggler for responsive -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navigation Items -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link"
               routerLink="/users"
               routerLinkActive="active"
               [routerLinkActiveOptions]="{ exact: true }">
              <i class="bi bi-house-door me-1"></i>
              Users
            </a>
          </li>
        </ul>

        <!-- Version Info -->
        <span class="navbar-text ms-3 small text-light opacity-75">
          v{{ version }}
        </span>
      </div>
    </div>
  </nav>
</header>

<!-- ================= BODY ================= -->
<main class="main-content flex-fill py-4">
  <div class="p-2">
    <router-outlet></router-outlet>
  </div>
</main>

<!-- ================= FOOTER ================= -->
<footer class="footer bg-info-subtle bg-primary py-4 mt-auto">
  <div class="container-fluid">
    <div class="row align-items-center">
      <div class="d-flex justify-content-center">
        <p class="mb-0">
          <i class="bi bi-c-circle me-1"></i>
          {{ date.getFullYear() }} {{ title }}. Built by <strong>Subodh Bhandari.</strong>
        </p>
      </div>
    </div>
  </div>
</footer>
