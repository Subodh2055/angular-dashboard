<div class="app-layout">
  <!-- Top Header -->
  <app-header [title]="title"></app-header>

  <div class="app-body">
    <!-- Left Sidebar -->
    <app-sidebar></app-sidebar>

    <!-- Main Content Area -->
    <div class="main-container">
      <main class="content-wrapper p-4">
        <router-outlet></router-outlet>
      </main>

      <!-- Page Footer -->
      <footer class="app-footer py-4 border-top border-light border-opacity-10 mt-auto">
        <div class="container-fluid">
          <div class="d-flex justify-content-between align-items-center">
            <p class="mb-0 glass-text-xs text-muted">
              &copy; {{ date.getFullYear() }} {{ title }}. All rights reserved.
            </p>
            <div class="footer-links d-flex gap-3">
              <a href="#" class="glass-text-xs text-muted text-decoration-none hover-primary">Privacy Policy</a>
              <a href="#" class="glass-text-xs text-muted text-decoration-none hover-primary">Terms of Service</a>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <!-- Right Sidebar / Control Panel -->
  <app-right-panel></app-right-panel>
</div>
